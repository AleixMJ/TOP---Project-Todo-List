<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>
<body>
    <nav>
       <div>All Tasks</div>
       <div><button id="newTask-btn">New Task</button></div>
    </nav>

    <dialog id="newTask-creation">
        <form id="newTask-form">

            <button class="closeTask-btn">X</button>
                        
            <div>
                <label for="task-title">Title</label>
                <input type="text" name="task-title" required></input>
            </div>
            <div>
                <label for="task-description">Description</label>
                <textarea name="task-description" id="task-description"
                    rows="20" required></textarea>

            </div>
            <div>
                <label for="task-dueDate">Due Date</label>
                <input type="date" name="task-dueDate" required></input>
            </div>
            <div>
                <label for="task-priority">Priority</label>
                <select name="task-priority" id="task-priority" required>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="urgent">Urgent</option>
                </select>
            </div>
            <div>
                <label for="task-notes">Notes</label>
                    <textarea name="task-notes" id="task-notes"
                    rows="4" required></textarea>
            </div>
            <div>
                <label for="task-checklist">Checklist</label>
                <input type="text" name="task-checklist" id="task-checklist"
                    placeholder="use commas to separate items" required></input>
            </div>
            <button type="submit">Create new task</button>
        </form>
            

    </dialog>

    <h1>Todo List</h1>
    <div class="todo-container"></div>
    
</body>
</html>
