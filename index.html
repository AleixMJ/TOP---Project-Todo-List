<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Todo List</title><script defer="defer" src="main.js"></script></head><body><header class="app-header"><div class="top-row"><button id="projects-btn">☰</button><div id="app-logo">Taskly</div><div></div></div><div class="project-info"><h1 id="project-name">Todo List</h1><button id="newTask-btn">Task +</button></div></header><dialog id="newTask-creation"><form id="newTask-form"><button class="closeTask-btn">X</button><div><label for="title">Title</label> <input name="title" required></div><div><label for="description">Description</label> <textarea name="description" id="description" rows="4" required></textarea></div><div><label for="dueDate">Due Date</label> <input type="date" name="dueDate" required></div><div><label for="priority">Priority</label> <select name="priority" id="priority" required><option value="Low">Low</option><option value="Medium">Medium</option><option value="High">High</option><option value="Urgent">Urgent</option></select></div><div><label for="notes">Notes</label> <textarea name="notes" id="notes" rows="4" required></textarea></div><div><label for="checklist">Checklist</label> <input name="checklist" id="checklist" placeholder="use commas to separate items" required></div><button type="submit" id="submitTask">Create new task</button></form></dialog><div class="todo-container"></div><div id="container-projects"><div class="sidebar-header"><div class="sidebar-logo">Taskly</div><div id="new-project-wrapper"><button id="show-input-btn">+ New Project</button><div id="input-section" class="hidden"><input id="new-project-name" placeholder="Project name..."><div class="input-actions"><button id="add-project-confirm">Add</button> <button id="cancel-project-btn">X</button></div></div></div></div><h3 class="sidebar-title">My Projects</h3></div></body></html>
